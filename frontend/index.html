<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <h1>Registracija</h1>
    <form id="registerForm" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Registruotis</button>
    </form>

    <h1>Pridėti skelbimą</h1>
    <form id="adForm" enctype="multipart/form-data">
        <input type="text" name="title" placeholder="Pavadinimas" required><br>
        <input type="text" name="category" placeholder="Kategorija" required><br>
        <textarea name="description" placeholder="Aprašymas"></textarea><br>
        <input type="number" name="price" placeholder="Kaina" step="0.01" required><br>
        <input type="file" name="image" accept="image/*"><br>
        <button type="submit">Pridėti</button>
    </form>
    
    <script src="script.js"></script>
</body>

</html>
